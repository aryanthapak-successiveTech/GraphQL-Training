type Comment{
    id:ID!
    commentedBy:String!
    text:String!
}

type Post{
    id:ID!
    postedBy:String!
    description:String!
    comments:[Comment]
    createdAt:String!
}

type PaginatedPosts{
    data:[Post!]!
    totalCount:Int!
    hasNext:Boolean!
    hasPrev:Boolean!
    currentPage:Int!
    totalPages:Int!
}

type User{
    id:ID!
    userName:String!
    email:String!
    posts:[Post!]
    isOnline:Boolean
}

type JWTPayload{
    token:String!
}

type UserError{
    code:Int
    message:String!
}

type Conversation{
    id:ID!
    messages:[Message!]
}

union UserResult=User|UserError

